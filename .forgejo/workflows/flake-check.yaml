on: [push]
enable-email-notifications: true
jobs:
  check-linux:
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - uses: https://github.com/DeterminateSystems/determinate-nix-action@v3
      - run: nix flake check
  check-macos:
    runs-on: macos
    steps:
      - uses: actions/checkout@v6
      - run: nix flake check
